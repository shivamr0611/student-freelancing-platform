{% extends 'base.html' %}
{% block title %}Register — FreelanceHub{% endblock %}
{% block content %}
<div style="width:100%;max-width:500px;">
  <div style="text-align:center;margin-bottom:32px;">
    <div style="font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;background:linear-gradient(135deg,#6c63ff,#00d4aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Join FreelanceHub</div>
    <p style="color:var(--muted);margin-top:8px;">Choose how you want to join</p>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <a href="{% url 'register_student' %}" style="text-decoration:none;">
      <div class="card" style="text-align:center;cursor:pointer;transition:border-color 0.15s;" onmouseover="this.style.borderColor='#6c63ff'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="font-size:2.5rem;margin-bottom:12px;"></div>
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--text);">Student</div>
        <p style="color:var(--muted);font-size:0.83rem;margin-top:8px;">Find freelance jobs and earn while you study</p>
      </div>
    </a>
    <a href="{% url 'register_company' %}" style="text-decoration:none;">
      <div class="card" style="text-align:center;cursor:pointer;transition:border-color 0.15s;" onmouseover="this.style.borderColor='#00d4aa'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="font-size:2.5rem;margin-bottom:12px;"></div>
        <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;color:var(--text);">Company</div>
        <p style="color:var(--muted);font-size:0.83rem;margin-top:8px;">Post jobs and hire talented students</p>
      </div>
    </a>
  </div>
  <p style="text-align:center;margin-top:20px;font-size:0.875rem;color:var(--muted);">
    Already have an account? <a href="{% url 'login' %}" style="color:var(--accent);">Sign in</a>
  </p>
</div>
{% endblock %}
